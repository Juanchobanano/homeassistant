services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - /home/juanchobanano/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=America/Bogota
    network_mode: host
    privileged: true
    restart: unless-stopped


  code-server:
    container_name: code-server
    image: linuxserver/code-server
    volumes:
      - /home/juanchobanano/homeassistant:/config
    ports:
      - "9444:8443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    restart: unless-stopped

  n8n:
    container_name: n8n
    image: n8nio/n8n:next
    restart: unless-stopped
    networks:
      - internal
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=supersecretpassword
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=true

      # Public URL
      - WEBHOOK_URL=https://n8n.asistentedehogar.com/
      - N8N_EDITOR_BASE_URL=https://n8n.asistentedehogar.com/

      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - DB_SQLITE_POOL_SIZE=5
      - N8N_RUNNERS_ENABLED=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true

      - N8N_SSO_SAML_ENABLED=false
      - N8N_SSO_OIDC_ENABLED=false
      - N8N_SSO_LDAP_ENABLED=false
    volumes:
      - /home/juanchobanano/homeassistant/n8n:/home/node/.n8n

  # ── Cloudflare Tunnel ──────────────────────────────────────────

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - internal

  # ── LLM Gateway ────────────────────────────────────────────────

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    user: root
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--allow-unconfigured",
      ]
    ports:
      - "18789:18789"
      - "18791:18791"
    environment:
      - ANTROPIC_API_KEY=${ANTROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GATEWAY_AUTH_TOKEN=super-secret-password
      - GATEWAY_CONTROLUI_DANGEROUSLYALLOWHOSTHEADERORIGINFALLBACK=true
    volumes:
      - /home/juanchobanano/homeassistant/openclaw:/root/.openclaw

  homeway:
    container_name: homeway
    image: homewayio/homeway
    network_mode: host
    environment:
      - HOME_ASSISTANT_IP=192.168.2.44
      - HOME_ASSISTANT_ACCESS_TOKEN=${HOMEWAY_ACCESS_TOKEN}
    volumes:
      - /home/juanchobanano/homeassistant/homeway:/data
    restart: unless-stopped

  unifi:
    image: jacobalberty/unifi:latest
    container_name: unifi
    restart: unless-stopped
    network_mode: host

    environment:
      - TZ=America/Bogota
      - UNIFI_UID=1000
      - UNIFI_GID=1000

    volumes:
      - /home/juanchobanano/homeassistant/unifi:/unifi


    # Puertos usados (informativo, NO configurado por Docker):
    # 8443 -> Web UI
    # 8080 -> Device adoption
    # 3478/udp -> STUN
    # 10001/udp -> Discovery

  # ── Twenty CRM ─────────────────────────────────────────────────

  twenty-db:
    container_name: twenty-db
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PG_DATABASE_USER:-twenty}
      - POSTGRES_PASSWORD=${PG_DATABASE_PASSWORD}
      - POSTGRES_DB=${PG_DATABASE_NAME:-default}
    volumes:
      - twenty_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: pg_isready -U ${PG_DATABASE_USER:-twenty} -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10

  twenty-redis:
    container_name: twenty-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["--maxmemory-policy", "noeviction"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  twenty-server:
    container_name: twenty-server
    image: twentycrm/twenty:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - twenty_local_data:/app/packages/twenty-server/.local-storage
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-twenty}:${PG_DATABASE_PASSWORD}@twenty-db:5432/${PG_DATABASE_NAME:-default}
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      REDIS_URL: redis://twenty-redis:6379
      STORAGE_TYPE: local
      APP_SECRET: ${TWENTY_APP_SECRET}
      ENCRYPTION_KEY: ${TWENTY_ENCRYPTION_KEY}
      FALLBACK_ENCRYPTION_KEY: ${TWENTY_FALLBACK_ENCRYPTION_KEY}
      DISABLE_DB_MIGRATIONS: "false"
      DISABLE_CRON_JOBS_REGISTRATION: "false"
      # Email (SMTP via Google Workspace)
      EMAIL_DRIVER: smtp
      EMAIL_SMTP_HOST: smtp.gmail.com
      EMAIL_SMTP_PORT: 587
      EMAIL_SMTP_USER: juanesteban@propiedadsegura.ai
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_FROM_ADDRESS: juanesteban@propiedadsegura.ai
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Asistente de Hogar}
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 5s
      timeout: 5s
      retries: 20

  twenty-worker:
    container_name: twenty-worker
    image: twentycrm/twenty:latest
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    volumes:
      - twenty_local_data:/app/packages/twenty-server/.local-storage
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-twenty}:${PG_DATABASE_PASSWORD}@twenty-db:5432/${PG_DATABASE_NAME:-default}
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      REDIS_URL: redis://twenty-redis:6379
      STORAGE_TYPE: local
      APP_SECRET: ${TWENTY_APP_SECRET}
      ENCRYPTION_KEY: ${TWENTY_ENCRYPTION_KEY}
      FALLBACK_ENCRYPTION_KEY: ${TWENTY_FALLBACK_ENCRYPTION_KEY}
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
      # Email (SMTP via Google Workspace)
      EMAIL_DRIVER: smtp
      EMAIL_SMTP_HOST: smtp.gmail.com
      EMAIL_SMTP_PORT: 587
      EMAIL_SMTP_USER: juanesteban@propiedadsegura.ai
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_FROM_ADDRESS: juanesteban@propiedadsegura.ai
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Asistente de Hogar}
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-server:
        condition: service_healthy
    networks:
      - internal

  # ── Monitoring stack ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    privileged: true
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run)($$|/)"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  prometheus_data:
  grafana_data:
  twenty_db_data:
  twenty_local_data:

networks:
  internal:
    driver: bridge
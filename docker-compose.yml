services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - /home/juanchobanano/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=America/Bogota
    network_mode: host
    privileged: true
    restart: unless-stopped

  # mosquitto:
  #   container_name: mosquitto
  #   image: eclipse-mosquitto:2.0
  #   network_mode: host
  #   ports:
  #     - "1883:1883"
  #     - "9001:9001"
  #   volumes:
  #     - /home/juanchobanano/homeassistant/mosquitto/config:/mosquitto/config
  #     - /home/juanchobanano/homeassistant/mosquitto/data:/mosquitto/data
  #     - /home/juanchobanano/homeassistant/mosquitto/log:/mosquitto/log
  #   restart: unless-stopped

  code-server:
    container_name: code-server
    image: linuxserver/code-server
    volumes:
      - /home/juanchobanano/homeassistant:/config
    ports:
      - "9444:8443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    restart: unless-stopped

  n8n:
    container_name: n8n
    image: n8nio/n8n:next
    restart: unless-stopped
    ports:
      - "5678:5678"   # Puerto donde n8n estará accesible
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true        # Activar autenticación básica
      - N8N_BASIC_AUTH_USER=admin        # Usuario para login
      - N8N_BASIC_AUTH_PASSWORD=supersecretpassword  # Contraseña para login
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_HOST=0.0.0.0

      - N8N_SECURE_COOKIE=false
      

      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - DB_SQLITE_POOL_SIZE=5
      - N8N_RUNNERS_ENABLED=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true

      # - N8N_HOST=192.168.2.44
      # - N8N_EDITOR_BASE_URL=http://192.168.2.44:5678
      # - N8N_API_BASE_URL=http://192.168.2.44:5678
      # - WEBHOOK_URL=http://192.168.2.44:5678/

      - N8N_SSO_SAML_ENABLED=false
      - N8N_SSO_OIDC_ENABLED=false  
      - N8N_SSO_LDAP_ENABLED=false
    volumes:
      - /home/juanchobanano/homeassistant/n8n:/home/node/.n8n

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    user: root
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--allow-unconfigured",
      ]
    ports:
      - "18789:18789"
      - "18791:18791"
    environment:
      - ANTROPIC_API_KEY=${ANTROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GATEWAY_AUTH_TOKEN=super-secret-password
      - GATEWAY_CONTROLUI_DANGEROUSLYALLOWHOSTHEADERORIGINFALLBACK=true
    volumes:
      - /home/juanchobanano/homeassistant/openclaw:/root/.openclaw

  homeway:
    container_name: homeway
    image: homewayio/homeway
    network_mode: host
    environment:
      - HOME_ASSISTANT_IP=192.168.2.44
      - HOME_ASSISTANT_ACCESS_TOKEN=${HOMEWAY_ACCESS_TOKEN}
    volumes:
      - /home/juanchobanano/homeassistant/homeway:/data
    restart: unless-stopped

  unifi:
    image: jacobalberty/unifi:latest
    container_name: unifi
    restart: unless-stopped
    network_mode: host

    environment:
      - TZ=America/Bogota
      - UNIFI_UID=1000
      - UNIFI_GID=1000

    volumes:
      - /home/juanchobanano/homeassistant/unifi:/unifi


    # Puertos usados (informativo, NO configurado por Docker):
    # 8443 -> Web UI
    # 8080 -> Device adoption
    # 3478/udp -> STUN
    # 10001/udp -> Discovery

  # ── Monitoring stack ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    privileged: true
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run)($$|/)"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  prometheus_data:
  grafana_data: